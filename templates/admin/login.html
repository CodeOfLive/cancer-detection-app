<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Girişi</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 360px; border: 1px solid #334155; }
        h2 { margin-top: 0; color: #38bdf8; text-align: center; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: white; box-sizing: border-box; }
        input:focus { outline: none; border-color: #38bdf8; }
        button { width: 100%; padding: 12px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 16px; }
        button:hover { background: #0ea5e9; }
        .flash { background: #ef4444; color: white; padding: 10px; border-radius: 6px; margin-bottom: 12px; text-align: center; font-size: 0.9rem; }
        .flash.success { background: #22c55e; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>🔐 Admin Girişi</h2>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ 'success' if category == 'success' else '' }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <!-- CSRF Token (Flask-WTF için zorunlu) -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            
            <input type="text" name="username" placeholder="Kullanıcı Adı" required autocomplete="username">
            <input type="password" name="password" placeholder="Şifre" required autocomplete="current-password">
            <button type="submit">Giriş Yap</button>
        </form>
    </div>
</body>
</html>
